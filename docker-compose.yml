services:
  parallax-stable:
    build:
      context: https://github.com/jbirky/revealjs_gui.git#main
      args:
        - VITE_PARALLAX_MODE=cloud
        - VITE_CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
    ports:
      - "127.0.0.1:3002:3002"
    volumes:
      - revealjs-data:/app/server/data
      - revealjs-uploads:/app/server/uploads
    env_file:
      - .env
    environment:
      - PARALLAX_MODE=cloud
      - PARALLAX_DB=postgres
      - NODE_ENV=production
    restart: unless-stopped

  parallax-dev:
    build:
      context: https://github.com/jbirky/revealjs_gui.git#dev
      args:
        - VITE_PARALLAX_MODE=cloud
        - VITE_CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
    ports:
      - "127.0.0.1:3003:3002"
    volumes:
      - parallax-dev-data:/app/server/data
      - parallax-dev-uploads:/app/server/uploads
    env_file:
      - .env
    environment:
      - PARALLAX_MODE=cloud
      - PARALLAX_DB=postgres
      - PARALLAX_STORAGE=r2
      - NODE_ENV=production
    restart: unless-stopped

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    ports:
      - "127.0.0.1:3004:3000"
    environment:
      DATABASE_URL: postgresql://umami:umami@umami-db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET:-replace-me-with-a-random-string}
    depends_on:
      umami-db:
        condition: service_healthy
    restart: unless-stopped

  umami-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - /home/jbirky/.cloudflared:/etc/cloudflared:ro
    depends_on:
      - parallax-stable
    restart: unless-stopped

volumes:
  revealjs-data:
    external: true
    name: revealjs_gui_revealjs-data
  revealjs-uploads:
    external: true
    name: revealjs_gui_revealjs-uploads
  parallax-dev-data:
  parallax-dev-uploads:
  umami-db-data:
