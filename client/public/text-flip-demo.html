<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
body { display: flex; align-items: center; justify-content: center; font-family: 'Latin Modern Roman', Georgia, serif; color: #ffffff; }

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

.line {
  position: absolute;
  text-align: center;
  white-space: nowrap;
  font-size: 32px;
  line-height: 1.4;
  transition: none;
  will-change: transform;
}

.line.bold {
  font-weight: 700;
  font-size: 38px;
  color: #6366f1;
}
</style>
</head>
<body>

<div class="container" id="container"></div>

<script>
const lines = [
  { text: "The Role of", bold: false },
  { text: "Tides", bold: true },
  { text: "and", bold: false },
  { text: "Differential Rotation", bold: true },
  { text: "in the", bold: false },
  { text: "Angular Momentum Evolution", bold: true },
  { text: "of Low-Mass Stars", bold: false },
];

const lineHeight = 52;
const container = document.getElementById('container');
const elements = [];

// Create line elements
lines.forEach((line, i) => {
  const el = document.createElement('div');
  el.className = 'line' + (line.bold ? ' bold' : '');
  el.textContent = line.text;
  container.appendChild(el);
  elements.push(el);
});

const n = lines.length;
const totalH = n * lineHeight;

// Position lines centered
function positionAt(positions) {
  elements.forEach((el, i) => {
    const y = positions[i] * lineHeight - totalH / 2 + lineHeight / 2;
    el.style.transform = `translateY(${y}px)`;
  });
}

// Initial positions: 0,1,2,3,4,5,6
let current = lines.map((_, i) => i);
positionAt(current);

// Target: reversed — 6,5,4,3,2,1,0
const target = [...current].reverse();

// Animation
const duration = 2500;
const staggerDelay = 150;
let startTime = null;
let animating = false;
let forward = true;

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function animate(timestamp) {
  if (!startTime) startTime = timestamp;
  const elapsed = timestamp - startTime;

  elements.forEach((el, i) => {
    const delay = i * staggerDelay;
    const t = Math.max(0, Math.min(1, (elapsed - delay) / duration));
    const eased = easeInOutCubic(t);

    const from = forward ? i : target[i];
    const to = forward ? target[i] : i;
    const pos = from + (to - from) * eased;

    const y = pos * lineHeight - totalH / 2 + lineHeight / 2;
    el.style.transform = `translateY(${y}px)`;

    // Scale pulse at midpoint
    const scale = 1 + 0.08 * Math.sin(eased * Math.PI);
    el.style.transform += ` scale(${scale})`;
  });

  const totalTime = duration + (n - 1) * staggerDelay;
  if (elapsed < totalTime) {
    requestAnimationFrame(animate);
  } else {
    animating = false;
    // Pause then reverse
    setTimeout(() => {
      forward = !forward;
      startTime = null;
      animating = true;
      requestAnimationFrame(animate);
    }, 2000);
  }
}

// Start after a brief pause
setTimeout(() => {
  animating = true;
  requestAnimationFrame(animate);
}, 1500);
</script>
</body>
</html>
