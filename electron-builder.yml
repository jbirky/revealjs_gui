appId: com.slides-editor.app
productName: SlidesEditor
directories:
  output: dist-electron

files:
  - electron/**/*
  - "!node_modules"

extraResources:
  - from: server/
    to: server/
  - from: client/dist/
    to: client/dist/

mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip

win:
  target:
    - nsis

linux:
  target:
    - AppImage
    - deb
  category: Office
  executableName: slides-editor
  executableArgs:
    - "--no-sandbox"
