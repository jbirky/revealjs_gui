<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expand Image Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1e1e2e;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .image-container {
    width: 260px;
    height: 170px;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s;
  }
  .image-container:hover {
    border-color: #6366f1;
  }
  .image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .hint {
    margin-top: 16px;
    font-size: 14px;
    color: #a0a0b8;
  }
  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.85);
    align-items: center;
    justify-content: center;
    z-index: 1000;
    cursor: pointer;
  }
  .overlay.active {
    display: flex;
  }
  .overlay img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 8px;
    cursor: default;
  }
</style>
</head>
<body>
<div class="image-container" id="thumb" tabindex="0">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Sunspots_1302_Sep_2011_by_NASA.jpg/1024px-Sunspots_1302_Sep_2011_by_NASA.jpg" alt="Sunspots">
</div>
<p class="hint">Click the image to expand</p>

<div class="overlay" id="overlay">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Sunspots_1302_Sep_2011_by_NASA.jpg/1024px-Sunspots_1302_Sep_2011_by_NASA.jpg" alt="Sunspots expanded">
</div>

<script>
  const thumb = document.getElementById('thumb');
  const overlay = document.getElementById('overlay');

  thumb.addEventListener('click', () => overlay.classList.add('active'));

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('active');
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') overlay.classList.remove('active');
  });
</script>
</body>
</html>
