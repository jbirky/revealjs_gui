<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1e1e2e;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  table {
    border-collapse: separate;
    border-spacing: 0;
    border-radius: 10px;
    overflow: hidden;
    font-size: 15px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
  }
  th {
    background: #6366f1;
    color: #ffffff;
    font-weight: 600;
    padding: 12px 24px;
    text-align: left;
  }
  td {
    background: #2a2a3e;
    padding: 10px 24px;
    border-bottom: 1px solid #3a3a50;
    color: #e0e0f0;
  }
  tr:last-child td {
    border-bottom: none;
  }
</style>
</head>
<body>
<table>
  <thead>
    <tr>
      <th>System</th>
      <th>P<sub>orb</sub> (days)</th>
      <th>P<sub>rot</sub> (days)</th>
      <th>e</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>KIC 6131659</td>
      <td>17.5</td>
      <td>17.6</td>
      <td>0.01</td>
    </tr>
    <tr>
      <td>KIC 9821078</td>
      <td>8.3</td>
      <td>9.4</td>
      <td>0.03</td>
    </tr>
    <tr>
      <td>KIC 4544587</td>
      <td>2.2</td>
      <td>2.5</td>
      <td>0.00</td>
    </tr>
  </tbody>
</table>
</body>
</html>
