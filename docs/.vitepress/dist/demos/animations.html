<!DOCTYPE html>
<html><head><meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1e1e2e;display:flex;align-items:center;justify-content:center;height:100vh;gap:24px;font-family:sans-serif;color:#fff;cursor:pointer;user-select:none}
.box{width:100px;height:100px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;text-align:center;line-height:1.3}
#msg{position:absolute;bottom:16px;font-size:12px;color:rgba(255,255,255,0.4)}
</style></head><body>
<div class="box" id="b1" style="background:#6366f1">Fade Up</div>
<div class="box" id="b2" style="background:#ec4899">Zoom In</div>
<div class="box" id="b3" style="background:#f59e0b">Flip X</div>
<div class="box" id="b4" style="background:#10b981">Slide Left</div>
<div id="msg">Click to replay</div>
<script>
function run(){
  gsap.fromTo("#b1",{opacity:0,y:40},{opacity:1,y:0,duration:0.6,ease:"power3.out"});
  gsap.fromTo("#b2",{opacity:0,scale:0.5},{opacity:1,scale:1,duration:0.6,delay:0.15,ease:"back.out(1.4)"});
  gsap.fromTo("#b3",{opacity:0,rotationX:90,transformPerspective:600},{opacity:1,rotationX:0,duration:0.6,delay:0.3,ease:"power2.out"});
  gsap.fromTo("#b4",{x:200},{x:0,duration:0.6,delay:0.45,ease:"power3.out"});
}
run();
document.addEventListener("click",function(){run()});
</script></body></html>
