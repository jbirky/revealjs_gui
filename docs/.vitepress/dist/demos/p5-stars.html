<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>p5 Starfield Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1e1e2e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  canvas { display: block; border-radius: 10px; }
</style>
</head>
<body>
<div id="sketch"></div>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
<script>
  const stars = [];
  const NUM = 120;
  const W = 500, H = 220;

  function setup() {
    const canvas = createCanvas(W, H);
    canvas.parent('sketch');
    for (let i = 0; i < NUM; i++) {
      stars.push({
        x: random(W),
        y: random(H),
        speed: random(0.3, 2.5),
        size: random(1, 3),
        brightness: random(150, 255)
      });
    }
  }

  function draw() {
    background(30, 30, 46);
    noStroke();
    for (const s of stars) {
      fill(255, 255, 255, s.brightness);
      ellipse(s.x, s.y, s.size, s.size);
      s.x -= s.speed;
      if (s.x < -2) {
        s.x = W + 2;
        s.y = random(H);
      }
    }
  }
</script>
</body>
</html>
