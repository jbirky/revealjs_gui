<!DOCTYPE html>
<html><head><meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1e1e2e;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;color:#fff;cursor:pointer;user-select:none}
#msg{font-size:14px;color:rgba(255,255,255,0.4);position:absolute;bottom:16px}
#slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:600}
</style></head><body>
<div id="slide">Click to trigger transition</div>
<div id="msg">Differential Rotation Transition</div>
<script>
var running=false;
document.addEventListener("click",function(){
  if(running)return;running=true;
  document.getElementById("slide").textContent="Next Slide";
  var N=16,vw=window.innerWidth,vh=window.innerHeight,bh=vh/N;
  var B=["#CC0000","#003399","#FFCC00"];
  var ov=document.createElement("div");
  ov.style.cssText="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9998;pointer-events:none;overflow:hidden;";
  var pending=N;
  for(var i=0;i<N;i++){
    var band=document.createElement("div");
    band.style.cssText="position:absolute;left:0;width:100%;background:#000;box-sizing:border-box;";
    band.style.top=(i*bh)+"px";band.style.height=(bh+0.5)+"px";
    if(i<N-1)band.style.borderBottom="1.5px solid "+B[i%3];
    ov.appendChild(band);
    var lat=Math.PI*((i+0.5)/N-0.5),c2=Math.cos(lat);c2*=c2;
    gsap.to(band,{x:vw+20,duration:0.4+1.0*(1-c2),ease:"none",
      onComplete:function(){pending--;if(pending<=0){ov.remove();running=false}}});
  }
  document.body.appendChild(ov);
});
</script></body></html>
